spring.application.name=demo

# === GROQ CHAT CONFIGURATION ===
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.api-key=
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# IMPORTANT: Groq does NOT provide an embedding model.
# Disable the OpenAI embedding model so Spring doesn't try to use it with the Groq URL.
spring.ai.openai.embedding.enabled=false

# === OLLAMA EMBEDDING CONFIGURATION ===
spring.ai.ollama.base-url=http://localhost:11434
# Disable Ollama Chat since we are using Groq for chatting
spring.ai.ollama.chat.enabled=false
# Enable Ollama Embedding
spring.ai.ollama.embedding.enabled=true
spring.ai.ollama.embedding.options.model=nomic-embed-text:latest

# === DATABASE CONFIGURATION ===
spring.datasource.url=jdbc:postgresql://localhost:9010/docha
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# === VECTOR STORE CONFIGURATION ===
# IMPORTANT: This property tells Spring AI to automatically create the pgvector extension and the vector_store table if they don't exist.
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
# nomic-embed-text outputs 768 dimensions by default
spring.ai.vectorstore.pgvector.dimensions=768