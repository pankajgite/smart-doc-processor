spring.application.name=demo

# Disable database and vector store auto-configuration for now (Phase 1)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

# OpenAI API Key
# Since this looks like a Groq API key, you must override the base URL to point to Groq instead of OpenAI
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.api-key=

# Important: Groq does not support the default OpenAI models (like gpt-4), you must specify a Groq model
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# Example database configuration (uncomment to use in later phases)
# spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
# spring.datasource.username=user
# spring.datasource.password=password
