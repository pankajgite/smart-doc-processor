<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chat with Documents</title>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function ChatApp() {
      const [files, setFiles] = useState([]);
      const [uploading, setUploading] = useState(false);
      const [context, setContext] = useState("");
      const [messages, setMessages] = useState([]);
      const [currentMessage, setCurrentMessage] = useState("");
      const [asking, setAsking] = useState(false);
      const chatEndRef = useRef(null);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages]);

      const handleFileChange = (e) => {
        setFiles(Array.from(e.target.files));
      };

      const handleUpload = async (e) => {
        e.preventDefault();
        if (files.length === 0) return;

        setUploading(true);
        const formData = new FormData();
        files.forEach(file => formData.append("files", file));

        try {
          const res = await fetch("/api/chat/upload", {
            method: "POST",
            body: formData
          });

          const data = await res.json();

          if (res.ok) {
            setContext(data.context);
            setMessages([
              {
                role: "bot",
                text: `✅ Processed ${files.length} document(s). Ask anything!`
              }
            ]);
          } else {
            setMessages([{ role: "bot", text: `Error: ${data.error}` }]);
          }
        } catch (err) {
          setMessages([{ role: "bot", text: `Upload failed: ${err.message}` }]);
        } finally {
          setUploading(false);
        }
      };

      const handleSendMessage = async (e) => {
        e.preventDefault();
        if (!currentMessage.trim() || !context) return;

        const userMsg = currentMessage;

        setMessages(prev => [...prev, { role: "user", text: userMsg }]);
        setCurrentMessage("");
        setAsking(true);

        try {
          const res = await fetch("/api/chat/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ context, question: userMsg })
          });

          const data = await res.json();

          if (res.ok) {
            setMessages(prev => [...prev, { role: "bot", text: data.answer }]);
          } else {
            setMessages(prev => [...prev, { role: "bot", text: `Error: ${data.error}` }]);
          }
        } catch (err) {
          setMessages(prev => [...prev, { role: "bot", text: `Failed: ${err.message}` }]);
        } finally {
          setAsking(false);
        }
      };

      return (
        <div class="h-screen flex">

          {/* Sidebar */}
          <div class="w-1/4 bg-white border-r p-5 flex flex-col shadow-sm">

            <h2 class="text-xl font-bold text-indigo-600 mb-4">
              📂 Documents
            </h2>

            {/* Upload */}
            <form onSubmit={handleUpload} class="flex flex-col gap-3">
              <input
                type="file"
                multiple
                accept="image/*,application/pdf"
                onChange={handleFileChange}
                class="text-sm file:bg-indigo-50 file:text-indigo-700 file:px-3 file:py-2 file:rounded-lg"
              />

              <button
                type="submit"
                disabled={uploading || files.length === 0}
                class={`py-2 rounded-lg text-white font-medium ${
                  uploading || files.length === 0
                    ? "bg-gray-300 cursor-not-allowed"
                    : "bg-indigo-600 hover:bg-indigo-700"
                }`}
              >
                {uploading ? "Processing..." : "Upload"}
              </button>
            </form>

            {/* Status */}
            {context && (
              <div class="mt-4 text-green-600 text-sm font-medium">
                ✅ Ready to chat
              </div>
            )}

            {/* File List */}
            <div class="mt-6 overflow-auto">
              <h3 class="text-sm font-semibold text-gray-500 mb-2">
                Uploaded Files
              </h3>

              <ul class="text-sm text-gray-700 space-y-2">
                {files.map((file, idx) => (
                  <li key={idx} class="truncate bg-gray-50 p-2 rounded-lg">
                    📄 {file.name}
                  </li>
                ))}
              </ul>
            </div>
          </div>

          {/* Chat Section */}
          <div class="flex flex-col flex-grow">

            {/* Header */}
            <div class="bg-white p-4 border-b flex justify-between items-center shadow-sm">
              <h1 class="text-xl font-semibold text-gray-700">
                Chat with Documents
              </h1>
              <span class="text-sm text-gray-400">AI Assistant</span>
            </div>

            {/* Messages */}
            <div class="flex-grow overflow-y-auto p-6 space-y-4 bg-gray-50">

              {messages.length === 0 ? (
                <div class="text-center text-gray-400 mt-24">
                  <p class="text-lg">Upload documents to start chatting</p>
                </div>
              ) : (
                messages.map((msg, idx) => (
                  <div
                    key={idx}
                    class={`max-w-xl p-4 rounded-2xl shadow-sm ${
                      msg.role === "user"
                        ? "ml-auto bg-indigo-600 text-white"
                        : "bg-white border"
                    }`}
                  >
                    <p class="text-xs opacity-70 mb-1">
                      {msg.role === "user" ? "You" : "AI Assistant"}
                    </p>
                    <p class="whitespace-pre-wrap">{msg.text}</p>
                  </div>
                ))
              )}

              {asking && (
                <div class="bg-white p-3 rounded-xl shadow w-fit">
                  <span class="animate-pulse">Typing...</span>
                </div>
              )}

              <div ref={chatEndRef}></div>
            </div>

            {/* Input */}
            <form
              onSubmit={handleSendMessage}
              class="p-4 bg-white border-t flex gap-3"
            >
              <input
                type="text"
                value={currentMessage}
                onChange={(e) => setCurrentMessage(e.target.value)}
                disabled={!context || asking}
                placeholder={
                  context
                    ? "Ask something about your documents..."
                    : "Upload documents first..."
                }
                class="flex-grow p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none disabled:bg-gray-100"
              />

              <button
                type="submit"
                disabled={!context || asking || !currentMessage.trim()}
                class={`px-5 rounded-xl text-white ${
                  !context || asking || !currentMessage.trim()
                    ? "bg-gray-300 cursor-not-allowed"
                    : "bg-indigo-600 hover:bg-indigo-700"
                }`}
              >
                Send
              </button>
            </form>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ChatApp />);
</script>
</body>
</html>
