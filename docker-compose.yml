services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: docha-pgvector
    ports:
      - "9010:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=docha
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    restart: always

volumes:
  pgvector-data:
